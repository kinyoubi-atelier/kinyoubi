<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Kinyoubi-House icon.

    A serif K with a gold superscript bullet. Mirrors the wordmark's
    typographic signature without using kanji. The K colour flips
    with prefers-color-scheme so the mark stays legible on both light
    and dark browser chrome. Kept in sync with public/favicon.svg.
  -->
  <style>
    .ink { fill: #111111; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #ECEAE2; }
    }
  </style>
  <text
    x="6" y="25"
    font-size="24"
    font-family="'Iowan Old Style', Charter, Georgia, serif"
    font-weight="600"
    class="ink"
  >K</text>
  <circle cx="22" cy="9" r="2.4" fill="#B58A3A" />
</svg>
